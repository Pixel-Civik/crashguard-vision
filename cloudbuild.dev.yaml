steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/crashguard-vision:$COMMIT_SHA'
      - .

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/crashguard-vision:$COMMIT_SHA'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - crashguard-vision
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/crashguard-vision:$COMMIT_SHA
      - --region=$_REGION
      - --platform=managed
      - --min-instances=0
      - --max-instances=10
      - --allow-unauthenticated
      - --set-env-vars=SUPABASE_URL=$_SUPABASE_URL
      - --set-secrets=GEMINI_API_KEY=crashguard-dev-gemini-api-key:latest,SUPABASE_SERVICE_KEY=crashguard-dev-supabase-secret-key:latest,VISION_API_KEY=crashguard-dev-vision-api-key:latest

substitutions:
  _REGION: us-east4
  _REPO: crashguard
  _SUPABASE_URL: https://ybplacznbjrfpzptqjfp.supabase.co

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/crashguard-vision:$COMMIT_SHA'
